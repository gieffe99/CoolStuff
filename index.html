<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Esci con me?</title>

  <!-- Libreria calendario carina: Flatpickr -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/material_red.css">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      background: linear-gradient(135deg, #ffdde1, #ee9ca7);
      overflow-x: hidden;
      overflow-y: auto;
      padding: 35px 0;
    }

    .card {
      background: white;
      padding: 32px;
      border-radius: 24px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      width: 90%;
      max-width: 540px;
      position: relative;
      z-index: 2;
    }

    h1 {
      margin-bottom: 24px;
      font-size: 28px;
      color: #333;
    }

    .buttons {
      position: relative;
      min-height: 80px;
      display: flex;
      justify-content: center;
      gap: 120px;
      align-items: flex-start;
    }

    button,
    input {
      font-size: 18px;
    }

    button {
      padding: 14px 32px;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    #yesBtn {
      background-color: #4caf50;
      color: white;
    }

    #yesBtn:hover {
      background-color: #43a047;
      transform: scale(1.08) rotate(-2deg);
    }

    #noBtn {
      background-color: #f44336;
      color: white;
      position: relative;
      left: auto;
      top: auto;
      transition: left 0.45s ease, top 0.45s ease, transform 0.2s ease;
      z-index: 10;
    }

    .hidden {
      display: none;
    }

    .step {
      margin-top: 20px;
      animation: fadeIn 0.35s ease;
    }

    .step-title {
      display: block;
      margin-bottom: 18px;
      font-size: 20px;
      color: #333;
      font-weight: bold;
    }

    .food-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
      margin-top: 10px;
    }

    .food-btn {
      position: relative;
      padding: 18px 14px;
      border-radius: 20px;
      background: #fff7f8;
      border: 2px solid #ffd1dc;
      color: #333;
      font-weight: bold;
      min-height: 88px;
      overflow: hidden;
      box-shadow: 0 6px 15px rgba(0, 0, 0, 0.08);
      transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
    }

    .food-btn::before {
      content: "";
      position: absolute;
      width: 80px;
      height: 80px;
      background: rgba(233, 30, 99, 0.14);
      border-radius: 50%;
      top: -30px;
      right: -30px;
      transition: transform 0.35s ease;
    }

    .food-btn:hover {
      transform: translateY(-8px) scale(1.04) rotate(-1deg);
      box-shadow: 0 12px 25px rgba(233, 30, 99, 0.25);
      border-color: #e91e63;
    }

    .food-btn:hover::before {
      transform: scale(3.2);
    }

    .food-btn span {
      position: relative;
      display: block;
      z-index: 1;
    }

    .food-icon {
      font-size: 34px;
      margin-bottom: 8px;
      transition: transform 0.25s ease;
    }

    .food-btn:hover .food-icon {
      transform: scale(1.25) rotate(8deg);
    }

    .food-btn.selected {
      background: #ffe4ec;
      border-color: #e91e63;
      color: #e91e63;
      transform: scale(1.03);
    }

    input[type="text"] {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #ee9ca7;
      border-radius: 14px;
      outline: none;
      margin-bottom: 18px;
      background: #fff7f8;
      text-align: center;
      cursor: pointer;
    }

    input[type="text"]:focus {
      border-color: #e91e63;
    }

    #confirmBtn {
      background-color: #e91e63;
      color: white;
    }

    #confirmBtn:hover {
      background-color: #d81b60;
      transform: scale(1.05);
    }

    #summary {
      margin-top: 18px;
      background: #fff0f4;
      border: 2px solid #ee9ca7;
      border-radius: 15px;
      padding: 16px;
      color: #333;
      font-size: 17px;
      line-height: 1.5;
      animation: fadeIn 0.35s ease;
    }

    #summary strong {
      color: #e91e63;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 500px) {
      body {
        padding: 22px 0;
      }

      .card {
        padding: 24px 20px;
      }

      .buttons {
        gap: 70px;
      }

      .food-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Esci con me?</h1>

    <div class="buttons" id="buttonsArea">
      <button id="yesBtn" type="button">Sì</button>
      <button id="noBtn" type="button">No</button>
    </div>

    <div id="foodStep" class="step hidden">
      <span class="step-title">Perfetto 😎 Cosa ti va di mangiare?</span>

      <div class="food-grid">
        <button class="food-btn" type="button" data-food="Pizza">
          <span class="food-icon">🍕</span>
          <span>Pizza</span>
        </button>

        <button class="food-btn" type="button" data-food="Sushi">
          <span class="food-icon">🍣</span>
          <span>Sushi</span>
        </button>

        <button class="food-btn" type="button" data-food="Hamburger">
          <span class="food-icon">🍔</span>
          <span>Hamburger</span>
        </button>

        <button class="food-btn" type="button" data-food="Cinese">
          <span class="food-icon">🥡</span>
          <span>Cinese</span>
        </button>
      </div>
    </div>

    <div id="dateStep" class="step hidden">
      <label class="step-title" for="dateInput">Scegli la data</label>
      <input type="text" id="dateInput" placeholder="Clicca per scegliere una data" readonly />
      <button id="confirmBtn" type="button">Conferma</button>
    </div>

    <div id="summary" class="hidden"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/it.js"></script>

  <script>
    const noBtn = document.getElementById("noBtn");
    const yesBtn = document.getElementById("yesBtn");
    const buttonsArea = document.getElementById("buttonsArea");
    const foodStep = document.getElementById("foodStep");
    const foodButtons = document.querySelectorAll(".food-btn");
    const dateStep = document.getElementById("dateStep");
    const dateInput = document.getElementById("dateInput");
    const confirmBtn = document.getElementById("confirmBtn");
    const summary = document.getElementById("summary");

    let selectedFood = "";
    let selectedDate = "";

    const today = new Date();

    flatpickr(dateInput, {
      locale: "it",
      minDate: "today",
      dateFormat: "d/m/Y",
      disableMobile: true,
      onChange: function(selectedDates, dateStr) {
        selectedDate = dateStr;
      }
    });

    function moveNoButtonSmoothly() {
      const buttonWidth = noBtn.offsetWidth;
      const buttonHeight = noBtn.offsetHeight;
      const padding = 20;

      const maxX = window.innerWidth - buttonWidth - padding;
      const maxY = window.innerHeight - buttonHeight - padding;

      const randomX = Math.floor(Math.random() * (maxX - padding)) + padding;
      const randomY = Math.floor(Math.random() * (maxY - padding)) + padding;

      noBtn.style.position = "fixed";
      noBtn.style.left = randomX + "px";
      noBtn.style.top = randomY + "px";
    }

    // Desktop: il bottone scappa quando ci passi sopra con il mouse
    noBtn.addEventListener("pointerenter", moveNoButtonSmoothly);

    // Smartphone/tablet: il bottone scappa quando provi a toccarlo
    noBtn.addEventListener("pointerdown", (event) => {
      event.preventDefault();
      moveNoButtonSmoothly();
    });

    // Sicurezza extra: impedisce comunque il click sul bottone No
    noBtn.addEventListener("click", (event) => {
      event.preventDefault();
    });

    function acceptProposal(event) {
      if (event) event.preventDefault();
      buttonsArea.classList.add("hidden");
      foodStep.classList.remove("hidden");
    }

    yesBtn.addEventListener("click", acceptProposal);
    yesBtn.addEventListener("touchstart", acceptProposal, { passive: false });

    foodButtons.forEach((button) => {
      button.addEventListener("click", () => {
        selectedFood = button.dataset.food;

        foodButtons.forEach((btn) => btn.classList.remove("selected"));
        button.classList.add("selected");

        dateStep.classList.remove("hidden");
        summary.classList.add("hidden");
      });
    });

    confirmBtn.addEventListener("click", () => {
      if (!selectedFood) {
        alert("No! Prima dimmi cosa mangiare");
        return;
      }

      if (!selectedDate) {
        alert("Non mi hai detto quandooo");
        return;
      }

      summary.innerHTML = `
        <strong>Riepilogo appuntamento:</strong><br>
        Hai scelto: <strong>${selectedFood}</strong><br>
        Data scelta: <strong>${selectedDate}</strong><br><br>
        Ottima scelta, direi che ormai è ufficiale 😎
      `;

      summary.classList.remove("hidden");
    });
  </script>
</body>
</html>
