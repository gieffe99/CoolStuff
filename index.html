<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sì o No</title>

  <!-- Libreria calendario carina: Flatpickr -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/material_red.css">

  <style>
    :root {
      --bg-start: #ffdde1;
      --bg-end: #ee9ca7;
      --accent: #e91e63;
      --accent-dark: #d81b60;
      --accent-light: #fff0f4;
      --accent-border: #ee9ca7;
      --soft-bg: #fff7f8;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      background: linear-gradient(135deg, var(--bg-start), var(--bg-end));
      overflow-x: hidden;
      overflow-y: auto;
      padding: 35px 0;
    }

    .theme-switcher {
      position: fixed;
      top: 18px;
      right: 18px;
      z-index: 50;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(10px);
      padding: 10px 12px;
      border-radius: 999px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .theme-dot {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 2px solid white;
      cursor: pointer;
      box-shadow: 0 3px 8px rgba(0, 0, 0, 0.22);
      transition: transform 0.2s ease, outline 0.2s ease;
      padding: 0;
    }

    .theme-dot:hover {
      transform: scale(1.18) rotate(8deg);
    }

    .theme-dot.active {
      outline: 3px solid #333;
      outline-offset: 2px;
    }

    .theme-pink {
      background: linear-gradient(135deg, #ffdde1, #ee9ca7);
    }

    .theme-blue {
      background: linear-gradient(135deg, #dbeafe, #60a5fa);
    }

    .theme-purple {
      background: linear-gradient(135deg, #ede9fe, #a78bfa);
    }

    .theme-green {
      background: linear-gradient(135deg, #dcfce7, #4ade80);
    }

    .theme-orange {
      background: linear-gradient(135deg, #ffedd5, #fb923c);
    }

    .card {
      background: white;
      padding: 32px;
      border-radius: 24px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      width: 90%;
      max-width: 540px;
      position: relative;
      z-index: 2;
    }

    h1 {
      margin-bottom: 24px;
      font-size: 28px;
      color: #333;
    }

    .buttons {
      position: relative;
      min-height: 80px;
      display: flex;
      justify-content: center;
      gap: 120px;
      align-items: flex-start;
    }

    button,
    input {
      font-size: 18px;
    }

    button {
      padding: 14px 32px;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    #yesBtn {
      background-color: #4caf50;
      color: white;
    }

    #yesBtn:hover {
      background-color: #43a047;
      transform: scale(1.08) rotate(-2deg);
    }

    #noBtn {
      background-color: #f44336;
      color: white;
      position: relative;
      left: auto;
      top: auto;
      transition: left 0.45s ease, top 0.45s ease, transform 0.2s ease;
      z-index: 10;
    }

    .hidden {
      display: none;
    }

    .step {
      margin-top: 20px;
      animation: fadeIn 0.35s ease;
    }

    .step-title {
      display: block;
      margin-bottom: 18px;
      font-size: 20px;
      color: #333;
      font-weight: bold;
    }

    .food-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
      margin-top: 10px;
    }

    .food-btn {
      position: relative;
      padding: 18px 14px;
      border-radius: 20px;
      background: var(--soft-bg);
      border: 2px solid var(--accent-border);
      color: #333;
      font-weight: bold;
      min-height: 88px;
      overflow: hidden;
      box-shadow: 0 6px 15px rgba(0, 0, 0, 0.08);
      transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
    }

    .food-btn::before {
      content: "";
      position: absolute;
      width: 80px;
      height: 80px;
      background: rgba(233, 30, 99, 0.14);
      border-radius: 50%;
      top: -30px;
      right: -30px;
      transition: transform 0.35s ease;
    }

    .food-btn:hover {
      transform: translateY(-8px) scale(1.04) rotate(-1deg);
      box-shadow: 0 12px 25px rgba(233, 30, 99, 0.25);
      border-color: var(--accent);
    }

    .food-btn:hover::before {
      transform: scale(3.2);
    }

    .food-btn span {
      position: relative;
      display: block;
      z-index: 1;
    }

    .food-icon {
      font-size: 34px;
      margin-bottom: 8px;
      transition: transform 0.25s ease;
    }

    .food-btn:hover .food-icon {
      transform: scale(1.25) rotate(8deg);
    }

    .food-btn.selected {
      background: var(--accent-light);
      border-color: var(--accent);
      color: var(--accent);
      transform: scale(1.03);
    }

    input[type="text"] {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid var(--accent-border);
      border-radius: 14px;
      outline: none;
      margin-bottom: 18px;
      background: var(--soft-bg);
      text-align: center;
      cursor: pointer;
    }

    input[type="text"]:focus {
      border-color: var(--accent);
    }

    #confirmBtn {
      background-color: var(--accent);
      color: white;
    }

    #confirmBtn:hover {
      background-color: var(--accent-dark);
      transform: scale(1.05);
    }

    #summary {
      margin-top: 18px;
      background: var(--accent-light);
      border: 2px solid var(--accent-border);
      border-radius: 15px;
      padding: 16px;
      color: #333;
      font-size: 17px;
      line-height: 1.5;
      animation: fadeIn 0.35s ease;
    }

    #summary strong {
      color: var(--accent);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 500px) {
      body {
        padding: 62px 0 22px;
      }

      .theme-switcher {
        top: 10px;
        right: 10px;
        padding: 8px 10px;
      }

      .theme-dot {
        width: 22px;
        height: 22px;
      }

      .card {
        padding: 24px 20px;
      }

      .buttons {
        gap: 70px;
      }

      .food-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="theme-switcher" aria-label="Cambia tema colore">
    <button class="theme-dot theme-pink active" type="button" data-theme="pink" aria-label="Tema rosa"></button>
    <button class="theme-dot theme-blue" type="button" data-theme="blue" aria-label="Tema blu"></button>
    <button class="theme-dot theme-purple" type="button" data-theme="purple" aria-label="Tema viola"></button>
    <button class="theme-dot theme-green" type="button" data-theme="green" aria-label="Tema verde"></button>
    <button class="theme-dot theme-orange" type="button" data-theme="orange" aria-label="Tema arancione"></button>
  </div>

  <div class="card">
    <h1>Esci con me?</h1>

    <div class="buttons" id="buttonsArea">
      <button id="yesBtn" type="button">Sì</button>
      <button id="noBtn" type="button">No</button>
    </div>

    <div id="foodStep" class="step hidden">
      <span class="step-title">Perfetto 😎 Cosa ti va di mangiare?</span>

      <div class="food-grid">
        <button class="food-btn" type="button" data-food="Pizza">
          <span class="food-icon">🍕</span>
          <span>Pizza</span>
        </button>

        <button class="food-btn" type="button" data-food="Sushi">
          <span class="food-icon">🍣</span>
          <span>Sushi</span>
        </button>

        <button class="food-btn" type="button" data-food="Hamburger">
          <span class="food-icon">🍔</span>
          <span>Hamburger</span>
        </button>

        <button class="food-btn" type="button" data-food="Cinese">
          <span class="food-icon">🥡</span>
          <span>Cinese</span>
        </button>
      </div>
    </div>

    <div id="dateStep" class="step hidden">
      <label class="step-title" for="dateInput">Scegli la data</label>
      <input type="text" id="dateInput" placeholder="Clicca per scegliere una data" readonly />
      <button id="confirmBtn" type="button">Conferma</button>
    </div>

    <div id="summary" class="hidden"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/it.js"></script>

  <script>
    const themes = {
      pink: {
        "--bg-start": "#ffdde1",
        "--bg-end": "#ee9ca7",
        "--accent": "#e91e63",
        "--accent-dark": "#d81b60",
        "--accent-light": "#fff0f4",
        "--accent-border": "#ee9ca7",
        "--soft-bg": "#fff7f8"
      },
      blue: {
        "--bg-start": "#dbeafe",
        "--bg-end": "#60a5fa",
        "--accent": "#2563eb",
        "--accent-dark": "#1d4ed8",
        "--accent-light": "#eff6ff",
        "--accent-border": "#93c5fd",
        "--soft-bg": "#f8fbff"
      },
      purple: {
        "--bg-start": "#ede9fe",
        "--bg-end": "#a78bfa",
        "--accent": "#7c3aed",
        "--accent-dark": "#6d28d9",
        "--accent-light": "#f5f3ff",
        "--accent-border": "#c4b5fd",
        "--soft-bg": "#fbfaff"
      },
      green: {
        "--bg-start": "#dcfce7",
        "--bg-end": "#4ade80",
        "--accent": "#16a34a",
        "--accent-dark": "#15803d",
        "--accent-light": "#f0fdf4",
        "--accent-border": "#86efac",
        "--soft-bg": "#f8fff9"
      },
      orange: {
        "--bg-start": "#ffedd5",
        "--bg-end": "#fb923c",
        "--accent": "#ea580c",
        "--accent-dark": "#c2410c",
        "--accent-light": "#fff7ed",
        "--accent-border": "#fdba74",
        "--soft-bg": "#fffaf5"
      }
    };

    const themeButtons = document.querySelectorAll(".theme-dot");

    function setTheme(themeName) {
      const selectedTheme = themes[themeName];

      Object.entries(selectedTheme).forEach(([property, value]) => {
        document.documentElement.style.setProperty(property, value);
      });

      themeButtons.forEach((button) => {
        button.classList.toggle("active", button.dataset.theme === themeName);
      });
    }

    themeButtons.forEach((button) => {
      button.addEventListener("click", () => setTheme(button.dataset.theme));
      button.addEventListener("touchstart", (event) => {
        event.preventDefault();
        setTheme(button.dataset.theme);
      }, { passive: false });
    });

    const noBtn = document.getElementById("noBtn");
    const yesBtn = document.getElementById("yesBtn");
    const buttonsArea = document.getElementById("buttonsArea");
    const foodStep = document.getElementById("foodStep");
    const foodButtons = document.querySelectorAll(".food-btn");
    const dateStep = document.getElementById("dateStep");
    const dateInput = document.getElementById("dateInput");
    const confirmBtn = document.getElementById("confirmBtn");
    const summary = document.getElementById("summary");

    let selectedFood = "";
    let selectedDate = "";

    flatpickr(dateInput, {
      locale: "it",
      minDate: "today",
      dateFormat: "d/m/Y",
      disableMobile: true,
      onChange: function(selectedDates, dateStr) {
        selectedDate = dateStr;
      }
    });

    function moveNoButtonSmoothly() {
      const buttonWidth = noBtn.offsetWidth;
      const buttonHeight = noBtn.offsetHeight;
      const padding = 20;

      const maxX = window.innerWidth - buttonWidth - padding;
      const maxY = window.innerHeight - buttonHeight - padding;

      const randomX = Math.floor(Math.random() * (maxX - padding)) + padding;
      const randomY = Math.floor(Math.random() * (maxY - padding)) + padding;

      noBtn.style.position = "fixed";
      noBtn.style.left = randomX + "px";
      noBtn.style.top = randomY + "px";
    }

    // Desktop: il bottone scappa quando ci passi sopra con il mouse
    noBtn.addEventListener("pointerenter", moveNoButtonSmoothly);

    // Smartphone/tablet: il bottone scappa quando provi a toccarlo
    noBtn.addEventListener("pointerdown", (event) => {
      event.preventDefault();
      moveNoButtonSmoothly();
    });

    // Sicurezza extra: impedisce comunque il click sul bottone No
    noBtn.addEventListener("click", (event) => {
      event.preventDefault();
    });

    function acceptProposal(event) {
      if (event) event.preventDefault();
      buttonsArea.classList.add("hidden");
      foodStep.classList.remove("hidden");
    }

    yesBtn.addEventListener("click", acceptProposal);
    yesBtn.addEventListener("touchstart", acceptProposal, { passive: false });

    foodButtons.forEach((button) => {
      button.addEventListener("click", () => {
        selectedFood = button.dataset.food;

        foodButtons.forEach((btn) => btn.classList.remove("selected"));
        button.classList.add("selected");

        dateStep.classList.remove("hidden");
        summary.classList.add("hidden");
      });

      button.addEventListener("touchstart", (event) => {
        event.preventDefault();
        selectedFood = button.dataset.food;

        foodButtons.forEach((btn) => btn.classList.remove("selected"));
        button.classList.add("selected");

        dateStep.classList.remove("hidden");
        summary.classList.add("hidden");
      }, { passive: false });
    });

    confirmBtn.addEventListener("click", showSummary);
    confirmBtn.addEventListener("touchstart", showSummary, { passive: false });

    function showSummary(event) {
      if (event) event.preventDefault();

      if (!selectedFood) {
        alert("Scegli prima cosa mangiare!");
        return;
      }

      if (!selectedDate) {
        alert("Devi dirmi quandoo!");
        return;
      }

      summary.innerHTML = `
        <strong>Riepilogo appuntamento:</strong><br>
        Hai scelto: <strong>${selectedFood}</strong><br>
        Data scelta: <strong>${selectedDate}</strong><br><br>
        Ottima scelta, direi che ormai è ufficiale 😎
      `;

      summary.classList.remove("hidden");
    }
  </script>
</body>
</html>
